<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meme Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>Meme Generator</h1>
  </header>

  <main>
    <div class="controls">
      <label class="upload-btn">
        Upload Image
        <input type="file" id="image-input" accept="image/*" hidden>
      </label>
      <button id="download-btn" disabled>Download Meme</button>
    </div>

    <div id="canvas-container" class="canvas-container">
      <canvas id="meme-canvas"></canvas>
      <div class="placeholder" id="placeholder">Upload an image to get started</div>
    </div>

    <p class="hint" id="hint" hidden>Click on the image to add text</p>
  </main>

  <script src="js/ImageLoader.js"></script>
  <script src="js/TextBox.js"></script>
  <script src="js/DragResize.js"></script>
  <script src="js/TextBoxManager.js"></script>
  <script src="js/Exporter.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
